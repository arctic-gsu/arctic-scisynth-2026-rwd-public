name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: setup/environment.yml
          cache-environment: true
          cache-environment-key: env-${{ hashFiles('setup/environment.yml', 'setup/environment.lock.yml') }}

      - name: Run tests
        shell: bash -l {0}
        run: python -m pytest tests/ -v
